name: kpa_app
description: KPA applicant app — iOS, Android, Web.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Models / serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # Auth + storage
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.2
  google_sign_in_web: ^0.12.4+3

  # Misc
  google_fonts: ^6.2.1
  package_info_plus: ^8.1.1
  intl: ^0.19.0
  uuid: ^4.5.1                  # X-Request-Id generation
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints
  very_good_analysis: ^6.0.0

  # Code-gen
  build_runner: ^2.15.0
  freezed: ^3.2.0
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.0
  go_router_builder: ^4.0.0
  custom_lint: ^0.8.0           # required by riverpod_lint
  riverpod_lint: ^3.1.0         # surfaces Riverpod misuse in `flutter analyze`

  # Test infra
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
  # No font assets here — google_fonts fetches Inter at runtime and caches.
  # If we later bundle Inter as an asset, register it in this `fonts:` section.
